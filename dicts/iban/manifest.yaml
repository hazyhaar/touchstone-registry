id: iban
version: "2026-03"
jurisdiction: intl
entity_type: iban
source: "ISO 13616 regex + MOD 97-10"
license: CC0
method: pattern
entity_spec:
  pattern: "^[A-Z]{2}\\d{2}[A-Z0-9]{11,30}$"
  sensitivity: financial
  pseudo_strategy: hash
  pseudo_prefix: "IBAN-"
patterns:
  # EU27
  - name: iban_at
    regex: "^AT\\d{2}\\d{16}$"
    validator: mod97
  - name: iban_be
    regex: "^BE\\d{2}\\d{12}$"
    validator: mod97
  - name: iban_bg
    regex: "^BG\\d{2}[A-Z]{4}\\d{6}[A-Z0-9]{8}$"
    validator: mod97
  - name: iban_hr
    regex: "^HR\\d{2}\\d{17}$"
    validator: mod97
  - name: iban_cy
    regex: "^CY\\d{2}\\d{8}[A-Z0-9]{16}$"
    validator: mod97
  - name: iban_cz
    regex: "^CZ\\d{2}\\d{20}$"
    validator: mod97
  - name: iban_dk
    regex: "^DK\\d{2}\\d{14}$"
    validator: mod97
  - name: iban_ee
    regex: "^EE\\d{2}\\d{16}$"
    validator: mod97
  - name: iban_fi
    regex: "^FI\\d{2}\\d{14}$"
    validator: mod97
  - name: iban_fr
    regex: "^FR\\d{2}\\d{10}[A-Z0-9]{11}\\d{2}$"
    validator: mod97
  - name: iban_de
    regex: "^DE\\d{2}\\d{18}$"
    validator: mod97
  - name: iban_gr
    regex: "^GR\\d{2}\\d{7}[A-Z0-9]{16}$"
    validator: mod97
  - name: iban_hu
    regex: "^HU\\d{2}\\d{24}$"
    validator: mod97
  - name: iban_ie
    regex: "^IE\\d{2}[A-Z]{4}\\d{14}$"
    validator: mod97
  - name: iban_it
    regex: "^IT\\d{2}[A-Z]\\d{10}[A-Z0-9]{12}$"
    validator: mod97
  - name: iban_lv
    regex: "^LV\\d{2}[A-Z]{4}[A-Z0-9]{13}$"
    validator: mod97
  - name: iban_lt
    regex: "^LT\\d{2}\\d{16}$"
    validator: mod97
  - name: iban_lu
    regex: "^LU\\d{2}\\d{16}$"
    validator: mod97
  - name: iban_mt
    regex: "^MT\\d{2}[A-Z]{4}\\d{5}[A-Z0-9]{18}$"
    validator: mod97
  - name: iban_nl
    regex: "^NL\\d{2}[A-Z]{4}\\d{10}$"
    validator: mod97
  - name: iban_pl
    regex: "^PL\\d{2}\\d{24}$"
    validator: mod97
  - name: iban_pt
    regex: "^PT\\d{2}\\d{21}$"
    validator: mod97
  - name: iban_ro
    regex: "^RO\\d{2}[A-Z]{4}[A-Z0-9]{16}$"
    validator: mod97
  - name: iban_sk
    regex: "^SK\\d{2}\\d{20}$"
    validator: mod97
  - name: iban_si
    regex: "^SI\\d{2}\\d{15}$"
    validator: mod97
  - name: iban_es
    regex: "^ES\\d{2}\\d{20}$"
    validator: mod97
  - name: iban_se
    regex: "^SE\\d{2}\\d{20}$"
    validator: mod97
  # EEA (non-EU)
  - name: iban_is
    regex: "^IS\\d{2}\\d{22}$"
    validator: mod97
  - name: iban_li
    regex: "^LI\\d{2}\\d{5}[A-Z0-9]{12}$"
    validator: mod97
  - name: iban_no
    regex: "^NO\\d{2}\\d{11}$"
    validator: mod97
  - name: iban_ch
    regex: "^CH\\d{2}\\d{17}$"
    validator: mod97
  # UK (post-Brexit, still IBAN)
  - name: iban_gb
    regex: "^GB\\d{2}[A-Z]{4}\\d{14}$"
    validator: mod97
  # Other common
  - name: iban_mc
    regex: "^MC\\d{2}\\d{10}[A-Z0-9]{11}\\d{2}$"
    validator: mod97
  - name: iban_sm
    regex: "^SM\\d{2}[A-Z]\\d{10}[A-Z0-9]{12}$"
    validator: mod97
  - name: iban_ad
    regex: "^AD\\d{2}\\d{8}[A-Z0-9]{12}$"
    validator: mod97
